# CI — fmt, clippy, test

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  DATABASE_URL: postgres://kora:kora@localhost:5432/kora

permissions:
  contents: read

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: kora
          POSTGRES_USER: kora
          POSTGRES_PASSWORD: kora
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kora"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Run CI checks
        run: just ci

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs
          path: target/tmp/
          retention-days: 14
