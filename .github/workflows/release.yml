# Release — automated via release-plz
#
# After CI passes on main, release-plz either:
#   - Creates/updates a Release PR (version bump + CHANGELOG)
#   - Or, if the Release PR was just merged, creates tag + GitHub Release
#
# The Release PR is your "release button" — merge it when you want to publish.
# On release: builds multi-arch Docker image + packages Helm chart, pushes both to GHCR.

name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

concurrency:
  group: release
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/romderful/kora
  CHART: oci://ghcr.io/romderful/kora/charts

jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.0

      - uses: Swatinem/rust-cache@v2

      - name: Run release-plz
        id: release
        uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        if: steps.release.outputs.releases_created == 'true'
        id: version
        env:
          RELEASES: ${{ steps.release.outputs.releases }}
        run: |
          VERSION=$(echo "$RELEASES" | jq -r '.[0].version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  docker:
    name: Docker
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: release-plz
    if: needs.release-plz.outputs.releases_created == 'true'
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:v${{ needs.release-plz.outputs.version }}
            ${{ env.IMAGE }}:latest
          provenance: false
          cache-from: type=gha,scope=docker
          cache-to: type=gha,mode=max,scope=docker

  helm:
    name: Helm chart
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [release-plz, docker]
    if: needs.release-plz.outputs.releases_created == 'true'
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Stamp chart version
        run: |
          VERSION=${{ needs.release-plz.outputs.version }}
          sed -i "s/^version:.*/version: ${VERSION}/" chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: ${VERSION}/" chart/Chart.yaml

      - name: Build Helm dependencies
        run: helm dependency build chart/

      - name: Lint chart
        run: helm lint chart/ --set database.host=lint --set database.password=lint

      - name: Package chart
        run: helm package chart/

      - name: Push chart to GHCR
        run: helm push kora-*.tgz ${{ env.CHART }}
