# Release — automated via release-plz
#
# After CI passes on main, release-plz either:
#   - Creates/updates a Release PR (version bump + CHANGELOG)
#   - Or, if the Release PR was just merged, creates tag + GitHub Release + Docker images
#
# The Release PR is your "release button" — merge it when you want to publish.

name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

concurrency:
  group: release
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/romderful/kora

jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.0

      - uses: Swatinem/rust-cache@v2

      - name: Run release-plz
        id: release
        uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        if: steps.release.outputs.releases_created == 'true'
        id: version
        env:
          RELEASES: ${{ steps.release.outputs.releases }}
        run: |
          VERSION=$(echo "$RELEASES" | jq -r '.[0].version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  docker:
    name: Docker (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: release-plz
    if: needs.release-plz.outputs.releases_created == 'true'
    permissions:
      packages: write

    strategy:
      matrix:
        include:
          - variant: slim
            embedded_pg: "false"
            tag_suffix: ""
          - variant: embedded
            embedded_pg: "true"
            tag_suffix: "-embedded"

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            EMBEDDED_PG=${{ matrix.embedded_pg }}
          tags: |
            ${{ env.IMAGE }}:v${{ needs.release-plz.outputs.version }}${{ matrix.tag_suffix }}
            ${{ env.IMAGE }}:latest${{ matrix.tag_suffix }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
